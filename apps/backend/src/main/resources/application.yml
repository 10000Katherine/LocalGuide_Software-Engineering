server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: localguide-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:localguide;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:localguide}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:3600}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:2592000}
